<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Events photography by Griffin Frankel." />
  <title>Events — Griffin Frankel Photography</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div></div>
    <a class="brand" href="index.html" aria-label="Home">
      <span class="brand__name">Griffin Frankel</span>
      <span class="brand__tag">Events</span>
    </a>
    <button class="menu-btn" id="menuBtn" aria-label="Open menu">Menu</button>
  </header>

  <nav class="nav-overlay" id="navOverlay" aria-label="Site navigation">
    <button class="nav-overlay__close" id="menuClose" aria-label="Close menu">Close</button>
    <ul class="nav-overlay__links">
      <li><a href="portrait.html">Portrait</a></li>
      <li><a href="city-nature.html">City &amp; Nature</a></li>
      <li><a href="events.html">Events</a></li>
      <div class="nav-overlay__divider"></div>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="grid" id="grid-events" aria-label="Events gallery">
      <!-- Cards injected by script.js -->
    </div>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Griffin Frankel. All rights reserved.</p>
  </footer>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <button class="lightbox__close" id="closeLightbox" aria-label="Close">✕</button>
    <button class="lightbox__nav lightbox__nav--prev" id="prevBtn" aria-label="Previous">‹</button>
    <figure class="lightbox__figure">
      <img id="lightboxImg" alt="" />
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
    <button class="lightbox__nav lightbox__nav--next" id="nextBtn" aria-label="Next">›</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
