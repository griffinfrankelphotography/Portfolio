<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0b0c0f"/>
  <!-- Accent line -->
  <rect x="6" y="27" width="20" height="1.5" rx="1" fill="rgba(255,255,255,0.85)"/>
  <!-- G - dominant letter -->
  <text x="16" y="18"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="700"
    fill="white">G</text>
  <!-- FP - subtitle -->
  <text x="16" y="26"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8"
    font-weight="400"
    fill="rgba(255,255,255,0.75)"
    letter-spacing="2.5">FP</text>
</svg>
